<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jordan-sales-agent</title>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Error overlay — captures window.onerror + unhandledrejection + a 5s
      "did React mount?" timeout and renders the result as a red panel.
      Costs ~1KB. Strip only after a successful real-user production session.
      Source: ~/.openclaw/roles/dev/templates/error-overlay.html
    -->
    <div id="ppb-error" style="display:none;position:fixed;inset:0;padding:20px;
      background:#7f1d1d;color:#fff;overflow:auto;font:12px/1.4 ui-monospace,monospace;z-index:9999">
      <h1 style="font:600 14px/1 -apple-system,sans-serif;margin:0 0 12px">Error caught</h1>
      <pre id="ppb-error-text" style="white-space:pre-wrap;margin:0"></pre>
    </div>
    <script>
    // Synchronous error capture — runs before src/main.tsx loads so we catch
    // bundle-load errors, parse errors, and pre-render exceptions. The
    // mount-detection timer is NOT here anymore (Codex v2 PR #45 [P2]
    // residual): it ran during bundle download on slow networks and fired
    // false positives. The timer has been moved to src/main.tsx where it
    // only starts AFTER the bundle has executed createRoot().render(), and
    // a React useEffect clears it on first commit. See main.tsx.
    (function(){
      var el=document.getElementById('ppb-error'), t=document.getElementById('ppb-error-text'), L=[];
      function show(){t.textContent=L.join('\n\n');el.style.display='block';}
      window.addEventListener('error',function(e){
        // Only handle real script errors. Resource load failures (img, iframe,
        // stylesheet, lazy chunk) also fire 'error' in capture mode but with
        // e.target as the failed element, not as an ErrorEvent. Without this
        // guard, a single failed asset triggered the full-screen red overlay
        // on an otherwise healthy session. (Codex review 12/05/2026, FE-P0-01.)
        if(!(e instanceof ErrorEvent)) return;
        L.push('window.error: '+(e.message||'unknown'));
        if(e.error&&e.error.stack)L.push('  stack: '+e.error.stack.substring(0,800));
        show();
      },true);
      window.addEventListener('unhandledrejection',function(e){
        var r=e.reason;
        L.push('unhandledrejection: '+(r&&r.message?r.message:String(r)));
        if(r&&r.stack)L.push('  stack: '+r.stack.substring(0,800));
        show();
      });
    })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
